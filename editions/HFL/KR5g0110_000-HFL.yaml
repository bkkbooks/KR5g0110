front:
  text: 洪恩靈濟真君靈籤
  hash: sha256:d74a9a92a8e2c57b94c3766aec51ab8d655f048335399e787c002248eca3d9f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0110_HFL_000-001a, image: hfl/1011/1011-204.png}
body:
  text: 第一籤上吉龍韜豹略韞奇謀若遇明時即獻籌世道風波多勇猛好從静處細沉浮第二籤上上吉夢先爲兆吉祥細尋稱意可參詳生男不獲桑弧志貴任須還再弄璋第三籤中青帝權當正届時深紅淺緑暎花枝上林一夜西風起天際行人知未知第四籤下蠻觸相傷萬事虚彼仁禮義却還初鄒陽繫獄沉消息誰上緹縈女子書第五籤上大吉閒步前途慢著鞭好將舟楫度平川一輪明月今霄滿萬里雲衢萬里天第六籤大吉一派波流勢欲東時人正在望洋中西山犬吠閒風月此去青雲有路通第七籤下尪羸病證不堪醫妙藥良方且慢施遇兎逢羊終獲吉莫教喜事轉成悲第八籤中下喪牛失馬不堪憂世事何須較贅疣若遇春初冬末後佳人休向道傍謀第九籤下薄雲殘霧未掃空東西南北未亨通人從生處且投下一葉秋來鴈過鴻第十籤中盈庭音耗不須多亦有訛言莫信他男子婚姻終獲吉狐疑未判事能蹉第十一籤上吉數行丹詔拆泥封萬里青雲喜得隆鶚薦横空消息好山間林下莫留蹤第十二籤中下寒谷陽回奪化工閒花不用怨春風凄凉外面傳消息荳蔻枝頭著意濃第十三籤中平鱸肥蓴美忽思秋萬頃波間可下鈎機露鷗飛空著力那堪明月滿歸舟第十四籤中上我强彼弱植降旌休向行人道不平雨霽雲收猶未歇春風才到便分明第十五籤下測度何須問再三冲天羽翼欲圖南忽然消息相邀阻事若成時又不堪第十六籤下征夫一箇在天涯虎在寅方望到家目斷魂銷音信絶梨花帶雨一枝斜第十七籤中下朱雀當權屬丙方不須來問子孫殃風波静處堪移步蜂蠆傷人莫自傷第十八籤中佳客龍門喜氣新天衢附翼且攀鱗等間借問吹嘘路免使微才歎析薪第十九籤中萬變枝頭不肯休誓兄盟母結寃讎好宜急解從前過拜佛求神始免憂第二十籤吉朱門桃李已成粧兩露工夫何艷陽一奏風雲彈刻到休言衣錦早還郷第二十一籤中求財求利意何貪莫信怡言未盡甘務是富商皆利息津津喜色在東南第二十二籤吉車馬遊人任往來閒花冷蘂苦相催不蒙一㸃東風力偷向墻頭半夜開第二十三籤下非是難尋一片心汗牛充棟莫追尋因縁到底有明白誰向林泉會賞音第二十四籤吉峥嶸頭角在鷄群無奈薰蕕未肯分桂子傳香才有信日邊姓字一朝聞第二十五籤下上食槁壤下黄泉雙鴈高飛兩處眠江水兩流人不見世情險阻甚山川第二十六籤中情歡意合兩諧和玉燭楊明薦瑞多却喜門庭無盗跖三星在户夕如何第二十七籤下命蹇身迍又值秋鬼神暗裏却相謀風前月下逢花酒只恐歡娱變作憂第二十八籤中下管見終難奪化機天工巧處未堪爲一場世事真棊局東壁龍蛇任奮飛第二十九籤上中涸魚赬尾仰清流一線微生幾欲休須待禹門三級浪明珠不向暗中投第三十籤上冷暖炎凉厭世人畫蛇斷鶴送天真却令門户無淹滯筆下春風奪化鈞第三十一籤上憂憾何須問是非但觀人事見天機人從坎處多如意一簇孤燈再燄煇第三十二籤下崑山玉石未分明瓦釜盆中聒耳鳴小往大來時未泰休將百計苦經營第三十三籤下甘苦從前幾歷嘗一生六度閱星霜憂心似醉人間夢役役經營底事忙第三十四籤下天上人間幾合離孤中獨立欲扶危折支折足應難免火自焚身尚不知第三十五籤中俄然平地起風波人事年來雜哄多准擬鹽梅歸大手均平五味一調和第三十六籤上中隔阻音書信尚違春回草木未光暉西山日落留殘照更有行人天外歸第三十七籤中水滿舟移等片時孤歸未判易生疑行人有意待明月相見何須問紫芝第三十八籤中下舉頭一片黑雲生天際求名未得名須扣黄鍾方大響好風吹送上蓬瀛第三十九籤中江水西流欲問舟等來功績幾時休傍人相對傳消息一箭雲頭看此秋第四十籤下求財求利意貪多西北風來問渡河得價明珠姑少待人生一夢到南柯第四十一籤下一枝紅紫間芳菲片片閒花逐水飛鶯巢燕子寧無意休向人間說是非第四十二籤中菊老秋衰萬物殘追尋舊恨與前歡驪珠出海猶埋彩直指東門日挂冠第四十三籤中下入雲青鳥未飛還信在虚無縹緲間日落秦樓三萬里白雲山外有青山第四十四籤中一憂一喜兩相扶萬事臨頭噬欲圖時日有如鷄翼卵行看末路有亨衢第四十五籤中鼎新革故遇陽來天際行人獲貴財回首移公纔咫尺務縁徒自莫疑猜第四十六籤中利名機會遇三生萬里鵬程掌上平牛馬殊途猶不及命如坎處且遲行第四十七籤下出岫濃雲未得閒淹留何日見青山一蠻一觸空相敵惹得虚名在世間第四十八籤下世態如兒不可論事窮勢極有歸根衣裳在笥先當慎莫共神交與鬼言第四十九籤上吉田家無歲不豐年時變相將問老天玉燭揚明魚吐夢秋來得價利千千第五十籤上上吉江頭少立避風波天意從人果若何直待萬門春浪暖乘槎一直到天河第五十一籤下人情依舊不如新五十年來又一旬是事聦由心上斷道傍築舍不須論第五十二籤中下孤燈剔盡未成眠拭淚含情在目前音信未逢人萬里朝來忽見鵲聲傳第五十三籤上吉時和歲稔世平明此去郷閭傳泰亨神喜人歡終獲吉百年心事幾圓成洪恩靈濟真君靈籤
